<div class="nftv-app">
<style>
.nftv-app {
  --bg: #0d0f1a;
  --surface: #161829;
  --surface2: #1e2138;
  --border: rgba(255,255,255,0.08);
  --accent: #7c6ff7;
  --accent2: #5ee7df;
  --text: #e8eaf6;
  --text-sub: #8891bb;
  --success: #4caf82;
  --error: #f06292;
  --warn: #ffb74d;

  font-family: 'Inter','Noto Sans JP',sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 24px 16px 60px;
  border-radius: 12px;
}

.nftv-app * {
  box-sizing: border-box;
}

.nftv-app .nftv-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}

.nftv-app .nftv-btn {
  background: linear-gradient(135deg, var(--accent), #5b8af5);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px 20px;
  cursor: pointer;
  font-weight: bold;
}

.nftv-app .nftv-btn:disabled {
  opacity: .4;
}

.nftv-app .nftv-option {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 8px;
  cursor: pointer;
}

.nftv-app .nftv-option.selected {
  border-color: var(--accent);
  background: rgba(124,111,247,.2);
}

.nftv-app .nftv-alert {
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  font-size: 0.9rem;
}

.nftv-app .info { background: rgba(91,138,245,.12); }
.nftv-app .error { background: rgba(240,98,146,.12); }
.nftv-app .success { background: rgba(76,175,130,.12); }

</style>

<div class="nftv-card">
  <h3>🗳️ NFT Voting</h3>
  <button class="nftv-btn" onclick="nftv_connect()">ウォレット接続</button>
  <div id="nftv-wallet"></div>
</div>

<div class="nftv-card" id="nftv-vote" style="display:none;">
  <h4 id="nftv-title"></h4>
  <div id="nftv-options"></div>
  <button class="nftv-btn" id="nftv-submit" disabled onclick="nftv_vote()">投票する</button>
  <div id="nftv-msg"></div>
</div>

</div>

<script>
const NFTV_API = "https://script.google.com/macros/s/AKfycbxK_BRGerGBWpf_e25e-qr3h4BQVGUlUx50a-2ArHoNnWYBnONoF-CSvYwdXJ-JeTCGgg/exec";

let nftv_wallet = null;
let nftv_voteId = null;
let nftv_selected = null;

async function nftv_connect(){
  if(!window.ethereum){
    nftv_alert("MetaMaskが必要です","error");
    return;
  }
  const acc = await ethereum.request({method:"eth_requestAccounts"});
  nftv_wallet = acc[0];

  document.getElementById("nftv-wallet").innerHTML =
    "接続: "+ nftv_wallet.slice(0,6)+"...";

  nftv_loadVote();
}

async function nftv_loadVote(){
  const res = await fetch(NFTV_API+"?action=getActiveVote").then(r=>r.json());
  if(!res.voteId) return;

  nftv_voteId = res.voteId;
  document.getElementById("nftv-vote").style.display="block";
  document.getElementById("nftv-title").innerText = res.title;

  const box = document.getElementById("nftv-options");
  box.innerHTML = "";

  res.options.forEach(o=>{
    const div = document.createElement("div");
    div.className="nftv-option";
    div.innerText=o;
    div.onclick=()=>{
      document.querySelectorAll(".nftv-option").forEach(e=>e.classList.remove("selected"));
      div.classList.add("selected");
      nftv_selected=o;
      document.getElementById("nftv-submit").disabled=false;
    };
    box.appendChild(div);
  });
}

async function nftv_vote(){
  if(!nftv_selected) return;

  const message = "Vote:"+nftv_selected;
  const sig = await ethereum.request({
    method:"personal_sign",
    params:[message,nftv_wallet]
  });

  const res = await fetch(NFTV_API,{
    method:"POST",
    body:JSON.stringify({
      action:"submitVote",
      voteId:nftv_voteId,
      wallet:nftv_wallet,
      choice:nftv_selected,
      signature:sig
    })
  }).then(r=>r.json());

  if(res.success){
    nftv_alert("投票完了","success");
  }else{
    nftv_alert("失敗: "+res.error,"error");
  }
}

function nftv_alert(msg,type){
  document.getElementById("nftv-msg").innerHTML =
    '<div class="nftv-alert '+type+'">'+msg+'</div>';
}
</script>
