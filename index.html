<div class="nftv-app">

<style>
.nftv-app{
  --bg:#0d0f1a;
  --surface:#161829;
  --surface2:#1e2138;
  --border:rgba(255,255,255,0.08);
  --accent:#7c6ff7;
  --accent2:#5ee7df;
  --text:#e8eaf6;
  --text-sub:#8891bb;
  --success:#4caf82;
  --error:#f06292;
  --warn:#ffb74d;

  font-family:'Inter','Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:24px 16px 60px;
  max-width:780px;
  margin:auto;
  border-radius:12px;
}

.nftv-app *{box-sizing:border-box;margin:0;padding:0;}

.nftv-app .header{text-align:center;padding:40px 0 32px;}
.nftv-app .logo{
  width:56px;height:56px;border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:28px;margin:0 auto 16px;
}

.nftv-app .card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
}

.nftv-app .card-title{
  font-size:.75rem;color:var(--text-sub);
  margin-bottom:14px;
}

.nftv-app .connect-btn,
.nftv-app .vote-btn{
  width:100%;
  background:linear-gradient(135deg,var(--accent),#5b8af5);
  color:#fff;border:none;border-radius:12px;
  padding:14px;font-weight:bold;cursor:pointer;
}

.nftv-app .option-btn{
  background:var(--surface2);
  border:1px solid var(--border);
  padding:14px;border-radius:12px;
  margin-bottom:10px;cursor:pointer;
}

.nftv-app .option-btn.selected{
  border-color:var(--accent);
  background:rgba(124,111,247,.2);
}

.nftv-hidden{display:none;}

.nftv-app .alert{
  padding:12px;border-radius:10px;margin-top:10px;
}
.nftv-app .alert-info{background:rgba(91,138,245,.12);}
.nftv-app .alert-success{background:rgba(76,175,130,.12);}
.nftv-app .alert-error{background:rgba(240,98,146,.12);}
</style>

<div class="header">
  <div class="logo">🗳️</div>
  <h2>NFT Snapshot Voting</h2>
</div>

<div class="card">
  <div class="card-title">ウォレット接続</div>
  <button class="connect-btn" onclick="connectWallet()">接続</button>
  <div id="wallet"></div>
</div>

<div class="card nftv-hidden" id="voteCard">
  <div class="card-title">投票</div>
  <div id="voteContent"></div>
</div>

<div class="card">
  <div class="card-title">結果</div>
  <canvas id="chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>

<script>
const API="https://script.google.com/macros/s/AKfycbxK_BRGerGBWpf_e25e-qr3h4BQVGUlUx50a-2ArHoNnWYBnONoF-CSvYwdXJ-JeTCGgg/exec";

let wallet=null,voteId=null,selected=null,chart=null;

async function connectWallet(){
 if(!window.ethereum){alert("MetaMask必要");return;}
 const acc=await ethereum.request({method:"eth_requestAccounts"});
 wallet=acc[0];
 document.getElementById("wallet").innerText=wallet;
 loadVote();
}

async function loadVote(){
 const v=await fetch(API+"?action=getActiveVote").then(r=>r.json());
 if(!v.voteId)return;

 voteId=v.voteId;
 document.getElementById("voteCard").classList.remove("nftv-hidden");

 let html="<h3>"+v.title+"</h3>";

 v.options.forEach(o=>{
  html+=`<div class="option-btn" onclick="selectOpt(this,'${o}')">${o}</div>`;
 });

 html+=`<button class="vote-btn" onclick="vote()">投票</button>`;

 document.getElementById("voteContent").innerHTML=html;
 loadResults();
}

function selectOpt(el,o){
 document.querySelectorAll(".option-btn").forEach(e=>e.classList.remove("selected"));
 el.classList.add("selected");
 selected=o;
}

async function vote(){
 const sig=await ethereum.request({
  method:"personal_sign",
  params:["Vote:"+selected,wallet]
 });

 await fetch(API,{
  method:"POST",
  body:JSON.stringify({action:"submitVote",voteId,wallet,choice:selected,signature:sig})
 });

 loadResults();
}

async function loadResults(){
 const r=await fetch(API+"?action=getResults&voteId="+voteId).then(r=>r.json());
 if(!r.options)return;

 const data=r.options.map(o=>r.tally[o]?.weight||0);

 if(chart)chart.destroy();

 chart=new Chart(document.getElementById("chart"),{
  type:"doughnut",
  data:{labels:r.options,datasets:[{data}]}
 });
}
</script>
